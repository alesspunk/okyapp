<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All MOCKUPS</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Nunito Sans", Arial, sans-serif;
        background: #e8ebf1;
      }

      .mockups-shell {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .mockups-carousel {
        width: fit-content;
        max-width: 100%;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .carousel-btn {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 1px solid #c9cfda;
        background: #ffffff;
        color: #596273;
        font-size: 22px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
      }

      .carousel-btn:hover:not(:disabled) {
        background: #eef1f7;
      }

      .carousel-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .mockups-viewport {
        width: 420px;
        max-width: calc(100vw - 120px);
        overflow: hidden;
      }

      .mockups-track {
        display: flex;
        width: 100%;
        transition: transform 260ms ease;
      }

      .mockup-frame {
        width: 360px;
        height: 800px;
        border: 1px solid #cfd4dc;
        border-radius: 20px;
        display: block;
        margin: 0 auto;
        background: #ffffff;
      }

      .mockup-slot {
        position: relative;
        flex: 0 0 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .mockup-badge {
        padding: 3px 10px;
        border-radius: 999px;
        background: #f1f3f6;
        color: #8c93a0;
        border: 1px solid #d8dde5;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2px;
        pointer-events: none;
      }

      .carousel-status {
        margin-top: 10px;
        text-align: center;
        color: #7e8795;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      .mockups-dots {
        display: none;
      }

      .mockups-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        border: 0;
        background: #c9cfda;
        cursor: pointer;
        padding: 0;
      }

      .mockups-dot.is-active {
        width: 22px;
        background: #6e7786;
      }

      @media (max-width: 768px) {
        body {
          padding: 16px 0 12px;
          overflow: auto;
        }

        .mockups-shell {
          min-height: 100%;
          justify-content: flex-start;
        }

        .mockups-carousel {
          width: 100%;
          gap: 0;
        }

        .carousel-btn {
          display: none;
        }

        .mockups-viewport {
          width: 100vw;
          max-width: 100vw;
          overflow: hidden;
        }

        .mockup-slot {
          width: 100vw;
          padding: 0;
        }

        .mockup-frame {
          width: 360px;
          min-width: 360px;
          max-width: 360px;
          margin: 0 auto;
        }

        .carousel-status {
          display: none;
        }

        .mockups-dots {
          margin-top: 12px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="mockups-shell">
      <main class="mockups-carousel" aria-label="Carrusel de mockups">
        <button class="carousel-btn" id="mockups-prev" type="button" aria-label="Mockup anterior">‹</button>
        <div class="mockups-viewport">
          <div class="mockups-track" id="mockups-track">
            <div class="mockup-slot">
              <iframe class="mockup-frame" src="/mockup-1.html?v=fa-render-2" title="Mockup 1"></iframe>
            </div>
            <div class="mockup-slot">
              <iframe class="mockup-frame" src="/mockup-2.html?v=fa-render-2" title="Mockup 2"></iframe>
              <span class="mockup-badge">Creada por la IA</span>
            </div>
            <div class="mockup-slot">
              <iframe class="mockup-frame" src="/mockup-3.html?v=fa-render-2" title="Mockup 3"></iframe>
              <span class="mockup-badge">Creada por la IA</span>
            </div>
            <div class="mockup-slot">
              <iframe class="mockup-frame" src="/mockup-4.html?v=fa-render-2" title="Mockup 4"></iframe>
              <span class="mockup-badge">Creada por la IA</span>
            </div>
            <div class="mockup-slot">
              <iframe class="mockup-frame" src="/mockup-5.html?v=fa-render-2" title="Mockup 5"></iframe>
              <span class="mockup-badge">Creada por la IA</span>
            </div>
          </div>
        </div>
        <button class="carousel-btn" id="mockups-next" type="button" aria-label="Mockup siguiente">›</button>
      </main>
      <p class="carousel-status" id="mockups-status" aria-live="polite">1 / 5</p>
      <nav class="mockups-dots" id="mockups-dots" aria-label="Navegación de mockups"></nav>
    </div>

    <script>
      (function initMockupsCarousel() {
        const track = document.getElementById("mockups-track");
        const prev = document.getElementById("mockups-prev");
        const next = document.getElementById("mockups-next");
        const status = document.getElementById("mockups-status");
        const dotsRoot = document.getElementById("mockups-dots");
        const viewport = document.querySelector(".mockups-viewport");
        if (!track || !prev || !next || !status || !viewport) return;

        const slides = Array.from(track.querySelectorAll(".mockup-slot"));
        const frames = Array.from(track.querySelectorAll(".mockup-frame"));
        const maxIndex = Math.max(0, slides.length - 1);
        const dots = slides.map((_, index) => {
          if (!dotsRoot) return null;
          const dot = document.createElement("button");
          dot.type = "button";
          dot.className = "mockups-dot";
          dot.setAttribute("aria-label", `Ir al mockup ${index + 1}`);
          dot.addEventListener("click", () => goTo(index));
          dotsRoot.appendChild(dot);
          return dot;
        });
        let current = 0;
        let touchStartX = null;

        const ICON_STYLES = [
          "/public/fontawesome-free/css/all.min.css",
          "/public/fontawesome-kit/css/custom-icons.min.css",
        ];

        const ensureIconStylesInFrame = (frame) => {
          try {
            const doc = frame.contentDocument;
            if (!doc || !doc.head) return;
            ICON_STYLES.forEach((href) => {
              if (doc.querySelector(`link[rel="stylesheet"][href="${href}"]`)) return;
              const link = doc.createElement("link");
              link.rel = "stylesheet";
              link.href = href;
              doc.head.appendChild(link);
            });
          } catch (error) {
            // Same-origin expected; ignore silently if frame is not ready yet.
          }
        };

        const render = () => {
          track.style.transform = `translateX(-${current * 100}%)`;
          prev.disabled = current <= 0;
          next.disabled = current >= maxIndex;
          status.textContent = `${current + 1} / ${slides.length}`;
          dots.forEach((dot, index) => {
            if (!dot) return;
            dot.classList.toggle("is-active", index === current);
            if (index === current) {
              dot.setAttribute("aria-current", "true");
            } else {
              dot.removeAttribute("aria-current");
            }
          });
        };

        const goTo = (index) => {
          current = Math.min(maxIndex, Math.max(0, index));
          render();
        };

        prev.addEventListener("click", () => goTo(current - 1));
        next.addEventListener("click", () => goTo(current + 1));
        frames.forEach((frame) => frame.addEventListener("load", () => ensureIconStylesInFrame(frame)));
        frames.forEach((frame) => ensureIconStylesInFrame(frame));
        setTimeout(() => frames.forEach((frame) => ensureIconStylesInFrame(frame)), 150);

        document.addEventListener("keydown", (event) => {
          if (event.key === "ArrowLeft") goTo(current - 1);
          if (event.key === "ArrowRight") goTo(current + 1);
        });

        viewport.addEventListener(
          "touchstart",
          (event) => {
            touchStartX = event.touches[0]?.clientX ?? null;
          },
          { passive: true }
        );

        viewport.addEventListener(
          "touchend",
          (event) => {
            const endX = event.changedTouches[0]?.clientX ?? null;
            if (touchStartX === null || endX === null) return;
            const deltaX = endX - touchStartX;
            if (Math.abs(deltaX) > 42) {
              goTo(current + (deltaX < 0 ? 1 : -1));
            }
            touchStartX = null;
          },
          { passive: true }
        );

        render();
      })();
    </script>
  </body>
</html>

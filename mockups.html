<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All MOCKUPS</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
        font-family: "Nunito Sans", Arial, sans-serif;
        background: #e8ebf1;
      }

      .mockups-row {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 140px;
        width: 100%;
        margin: 0 auto;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 8px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .mockups-row::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .mockup-frame {
        width: 360px;
        height: 800px;
        border: 1px solid #cfd4dc;
        border-radius: 20px;
        display: block;
        margin: 0 auto;
        background: #ffffff;
      }

      .mockup-slot {
        position: relative;
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .mockup-badge {
        padding: 3px 10px;
        border-radius: 999px;
        background: #f1f3f6;
        color: #8c93a0;
        border: 1px solid #d8dde5;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="mockups-row">
      <div class="mockup-slot">
        <iframe class="mockup-frame" src="./mockup-1.html" title="Mockup 1"></iframe>
      </div>
      <div class="mockup-slot">
        <iframe class="mockup-frame" src="./mockup-2.html" title="Mockup 2"></iframe>
        <span class="mockup-badge">Creada por la IA</span>
      </div>
      <div class="mockup-slot">
        <iframe class="mockup-frame" src="./mockup-3.html" title="Mockup 3"></iframe>
        <span class="mockup-badge">Creada por la IA</span>
      </div>
      <div class="mockup-slot">
        <iframe class="mockup-frame" src="./mockup-4.html" title="Mockup 4"></iframe>
        <span class="mockup-badge">Creada por la IA</span>
      </div>
      <div class="mockup-slot">
        <iframe class="mockup-frame" src="./mockup-5.html" title="Mockup 5"></iframe>
        <span class="mockup-badge">Creada por la IA</span>
      </div>
    </main>
  </body>
</html>

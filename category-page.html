<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category Page - OKY</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,700&family=Inter:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/public/fontawesome-kit/css/custom-icons.min.css" />
    <link rel="stylesheet" href="./stories/mars.css" />
    <link rel="stylesheet" href="/public/catalog-pages.css" />
  </head>
  <body>
    <main class="catalog-page-shell" aria-labelledby="category-page-title">
      <div class="catalog-page-scroll">
        <header class="catalog-page-top" aria-label="Encabezado de categoría">
          <div class="status-bar">
            <div>9:41</div>
            <div class="catalog-page-status-icons">
              <i class="fa-regular fa-signal" aria-hidden="true"></i>
              <i class="fa-regular fa-wifi" aria-hidden="true"></i>
              <i class="fa-regular fa-battery-full" aria-hidden="true"></i>
            </div>
          </div>

          <div class="page-header-screen category-page-header">
            <div class="header-icon header-icon-light"><i class="fa-light fa-arrow-left icon-medium" aria-hidden="true"></i></div>
            <h1 id="category-page-title" class="page-header-title">Invitar a comer</h1>
            <div class="header-cart-chip header-cart-full">
              <span class="header-cart-count">1</span>
              <i class="fa-light fa-cart-shopping" aria-hidden="true"></i>
            </div>
          </div>

          <div class="category-page-plateu-wrap">
            <section
              class="plateu-molecule is-scrolling is-default category-page-plateu"
              aria-label="Categorías de comida"
              data-pen-id="6985:152321"
            >
              <div class="plateu-track is-scrolling">
                <div class="plateu-item plateu-item-fixed">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu5.png" alt="Comida rápida" /></div>
                  <span class="plateu-chip">Comida rápida</span>
                </div>
                <div class="plateu-item plateu-item-fixed">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu12.png" alt="Pastelería" /></div>
                  <span class="plateu-label">Pastelería</span>
                </div>
                <div class="plateu-item plateu-item-fixed">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu13.png" alt="Restaurantes" /></div>
                  <span class="plateu-label">Restaurantes</span>
                </div>
                <div class="plateu-item plateu-item-fixed">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu14.png" alt="Cafeterías" /></div>
                  <span class="plateu-label">Cafeterías</span>
                </div>
                <div class="plateu-item plateu-item-fixed">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu11.png" alt="Antenita" /></div>
                  <span class="plateu-label">Antenita</span>
                </div>
              </div>
            </section>
          </div>

          <section class="catalog-page-search-wrap" role="search" aria-label="Buscar marcas">
            <div class="input-wrapper">
              <i class="fa-regular fa-magnifying-glass search-icon" aria-hidden="true"></i>
              <input
                class="input-field search-input search-input-empty"
                type="search"
                name="category-search"
                placeholder="Buscar marcas"
                aria-label="Buscar marcas"
              />
              <button class="icon-button clear-icon search-clear-icon catalog-page-search-clear" type="button" aria-label="Limpiar búsqueda" tabindex="-1">
                <i class="fa-regular fa-circle-xmark" aria-hidden="true"></i>
              </button>
            </div>
          </section>
        </header>

        <section class="category-page-content">
          <section class="homecard-organism" aria-labelledby="category-fast-food-title" data-pen-id="69435:51331">
            <header class="homecard-header">
              <h2 id="category-fast-food-title" class="token-h6 homecard-title">Comida Rápida</h2>
            </header>

            <div class="homecard-content homecard-content-default">
              <div class="homecard-grid">
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/pollo-granjero.webp" alt="Pollo Granjero logo" /></div>
                  <p class="token-brand homecard-tile-name">Pollo Granjero</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/burguerking.webp" alt="Burger King logo" /></div>
                  <p class="token-brand homecard-tile-name">Burger King</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/ihop.webp" alt="IHOP logo" /></div>
                  <p class="token-brand homecard-tile-name">IHOP</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/mcdonalds.webp" alt="McDonald's logo" /></div>
                  <p class="token-brand homecard-tile-name">McDonald’s</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/pollo-campero.webp" alt="Pollo Campero logo" /></div>
                  <p class="token-brand homecard-tile-name">Pollo Campero</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/applebees.webp" alt="Applebee's logo" /></div>
                  <p class="token-brand homecard-tile-name">Applebee’s</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/san-martin.webp" alt="San Martín logo" /></div>
                  <p class="token-brand homecard-tile-name">San Martín</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap"><img class="homecard-tile-logo" src="./images/anfora.webp" alt="Ánfora logo" /></div>
                  <p class="token-brand homecard-tile-name">Ánfora</p>
                </article>
              </div>
            </div>

            <footer class="homecard-footer">
              <button class="btn btn-primary btn-small" type="button">Ver más</button>
            </footer>
          </section>

          <section class="homecard-organism category-page-pastry-card" aria-labelledby="category-pastry-title" data-pen-id="69435:51421">
            <header class="homecard-header">
              <h2 id="category-pastry-title" class="token-h6 homecard-title">Pastelería</h2>
            </header>

            <div class="homecard-content homecard-content-default">
              <div class="homecard-grid">
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap category-page-brand-card is-anfora">
                    <img class="homecard-tile-logo category-page-brand-logo is-contain" src="./images/anfora.webp" alt="Ánfora logo" />
                  </div>
                  <p class="token-brand homecard-tile-name">Ánfora</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap category-page-brand-card is-san-martin">
                    <img class="homecard-tile-logo category-page-brand-logo is-contain" src="./images/san-martin.webp" alt="San Martín logo" />
                  </div>
                  <p class="token-brand homecard-tile-name">San Martín</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap category-page-brand-card is-full-bleed">
                    <img class="homecard-tile-logo category-page-brand-logo is-cover" src="./images/panadely.webp" alt="Panadely logo" />
                  </div>
                  <p class="token-brand homecard-tile-name">Panadely</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap category-page-brand-card is-white-card">
                    <img class="homecard-tile-logo category-page-brand-logo is-contain" src="./images/mccafe.webp" alt="McCafé logo" />
                  </div>
                  <p class="token-brand homecard-tile-name">McCafé</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap category-page-brand-card is-full-bleed">
                    <img class="homecard-tile-logo category-page-brand-logo is-cover" src="./images/starbucks.webp" alt="Starbucks logo" />
                  </div>
                  <p class="token-brand homecard-tile-name">Starbucks</p>
                </article>
                <article class="homecard-tile">
                  <div class="homecard-tile-logo-wrap category-page-brand-card is-full-bleed">
                    <img class="homecard-tile-logo category-page-brand-logo is-cover" src="./images/ihop.webp" alt="IHOP logo" />
                  </div>
                  <p class="token-brand homecard-tile-name">IHOP</p>
                </article>
              </div>
            </div>

            <footer class="homecard-footer">
              <button class="btn btn-primary btn-small" type="button">Ver más</button>
            </footer>
          </section>
        </section>
      </div>

      <nav class="catalog-page-nav" aria-label="Navegación principal">
        <div class="bottom-nav is-no-label">
          <div class="nav-item"><i class="fa-light fa-home icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item"><i class="fa-light fa-map icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item active"><i class="fa-solid fa-fire icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item"><i class="fa-light fa-messages icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item"><i class="fa-light fa-bars icon-medium" aria-hidden="true"></i></div>
        </div>
      </nav>
    </main>
  </body>
</html>

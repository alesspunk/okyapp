<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Page - OKY</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,700&family=Inter:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/public/fontawesome-kit/css/custom-icons.min.css" />
    <link rel="stylesheet" href="./stories/mars.css" />
    <link rel="stylesheet" href="/public/checkout-pages.css" />
  </head>
  <body>
    <main class="checkout-page-shell" aria-labelledby="checkout-page-title">
      <div class="checkout-page-scroll">
        <header class="checkout-page-top" aria-label="Encabezado de checkout">
          <h1 id="checkout-page-title" class="sr-only">Checkout de gift card</h1>
          <div class="status-bar">
            <div>9:41</div>
            <div class="checkout-page-status-icons">
              <i class="fa-regular fa-signal" aria-hidden="true"></i>
              <i class="fa-regular fa-wifi" aria-hidden="true"></i>
              <i class="fa-regular fa-battery-full" aria-hidden="true"></i>
            </div>
          </div>

          <div class="checkout-page-header-wrap page-header-organism is-checkout-overlap">
            <div class="page-header-screen checkout-page-header">
              <div class="header-icon header-icon-light"><i class="fa-light fa-arrow-left icon-medium" aria-hidden="true"></i></div>
              <div class="page-header-title page-header-title-empty" aria-hidden="true"></div>
              <div class="header-icon header-icon-bitmap header-icon-bitmap-cart" aria-hidden="true">
                <img class="header-icon-bitmap-image header-icon-bitmap-cart-image" src="./images/Cart-3d-icon.png" alt="" />
                <span class="header-icon-indicator-dot"></span>
              </div>
            </div>

            <div class="checkout-page-brand-overlap page-header-organism-brand-overlap">
              <div class="brand-item-atom is-with-label">
                <p class="brand-item-label token-product-text">Target</p>
                <div class="brand-item-frame">
                  <div class="brand-item-base">
                    <img src="./images/target.webp" alt="Target" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <section class="checkout-page-main">
          <div class="checkout-brand-carrousel-shell">
            <section class="brand-carrousel-organism checkout-brand-carrousel" aria-label="Brand Carrousel">
              <div class="brand-carrousel-track">
                <div class="brand-carrousel-side brand-carrousel-side-left">
                  <div class="brand-item-atom is-medium">
                    <div class="brand-item-frame">
                      <div class="brand-item-base">
                        <img src="./images/amazon.png" alt="Amazon" />
                      </div>
                    </div>
                  </div>
                </div>

                <div class="brand-carrousel-center">
                  <div class="brand-carrousel-center-card">
                    <section class="middle-card-shell is-checkout" aria-label="Detalle principal del producto" data-pen-id="6991:146335">
                      <article class="middle-card-molecule is-egift">
                        <div class="middle-card-content">
                          <div class="middle-card-main">
                            <p class="middle-card-title">Target E-Gift Card</p>
                            <div class="middle-card-center">
                              <div class="middle-card-value">
                                <span class="middle-card-currency">$</span>
                                <p class="middle-card-amount">40</p>
                              </div>
                            </div>
                          </div>
                          <div class="middle-card-footer">
                            <span class="middle-card-footer-start">Brand Disclaimer</span>
                            <span class="middle-card-footer-end" aria-hidden="true"></span>
                            <span class="fa-icon fa-icon-card-use middle-card-link-icon" aria-hidden="true">
                              <i class="fa-thin fa-arrow-up-right-from-square"></i>
                            </span>
                          </div>
                        </div>
                      </article>
                    </section>
                  </div>
                  <button class="btn btn-primary btn-small brand-carrousel-cta" type="button">Ver detalle</button>
                </div>

                <div class="brand-carrousel-side brand-carrousel-side-right">
                  <div class="brand-item-atom is-medium">
                    <div class="brand-item-frame">
                      <div class="brand-item-base">
                        <img src="./images/starbucks.webp" alt="Starbucks" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>

          <section class="checkout-recipient-wrap" aria-label="¿Para quién es?">
            <article class="dual-molecule is-default" data-pen-id="7370:49614">
              <span class="dual-floating-label">¿Para quién es?</span>
              <div class="dual-card">
                <span class="dual-avatar" aria-hidden="true">
                  <i class="fa-solid fa-user"></i>
                </span>
                <div class="dual-copy">
                  <p class="dual-title">Aracely</p>
                  <p class="dual-subtitle">+502 6814-9122</p>
                </div>
                <span class="dual-action" aria-hidden="true">
                  <img src="./images/whatsapp.png" alt="" />
                </span>
              </div>
            </article>
          </section>

          <section class="checkout-payment-wrap" aria-label="Método de pago">
            <div class="payment-method-input" data-pen-id="7006:109054">
              <span class="payment-method-label">Método de pago</span>
              <div class="payment-method-control">
                <span class="fa-icon fa-icon-md payment-method-icon" aria-hidden="true">
                  <i class="fak fa-kit fa-okysaldo payment-method-icon-glyph"></i>
                </span>
                <span class="payment-method-copy">Saldo OKY</span>
                <span class="payment-method-chip">$50.50</span>
                <button class="payment-method-action" type="button" aria-label="Más opciones de pago">
                  <i class="fa-solid fa-ellipsis-vertical" aria-hidden="true"></i>
                </button>
              </div>
            </div>
          </section>

          <section class="checkout-promo-wrap" aria-label="Código promocional">
            <div class="promo-code-molecule" data-state="entered">
              <span class="promo-code-leading" aria-hidden="true">
                <img src="./images/PROMOS@2x.webp" alt="" />
              </span>
              <p class="promo-code-copy"><span class="promo-code-prefix">Código Promo:</span> verano10</p>
              <button class="promo-code-action promo-clear" type="button" aria-label="Quitar código">
                <i class="fa-solid fa-circle-xmark icon-medium" aria-hidden="true"></i>
              </button>
              <button class="promo-code-action promo-open" type="button" aria-label="Ingresar código">
                <i class="fa-solid fa-chevron-right icon-medium" aria-hidden="true"></i>
              </button>
            </div>
          </section>

          <section class="checkout-summary-wrap" aria-label="Resumen de compra">
            <div class="summary-box summary-box-compact summary-box-saving" data-flow="products" data-step="checkout">
              <div class="summary-card">
                <div class="summary-card-body">
                  <div class="summary-row">
                    <span class="summary-label-strong">3 Productos</span>
                    <span><span class="summary-value-old">$70.00</span> <span class="summary-value-new">$55.50</span></span>
                  </div>
                  <div class="summary-row">
                    <span class="summary-value-success">Código promo</span>
                    <span class="summary-value-success">-$5.00</span>
                  </div>
                  <div class="summary-row summary-row-total checkout-summary-total">
                    <span class="summary-label-strong">TOTAL</span>
                    <span class="summary-label-strong">$50.50</span>
                  </div>
                </div>
                <div class="summary-savings-row">
                  <i class="fa-solid fa-tags" aria-hidden="true"></i>
                  <span>¡Ahorro total $19.50!</span>
                </div>
                <div class="summary-cta-row">
                  <button class="btn btn-primary summary-btn" type="button">Comprar</button>
                </div>
              </div>
            </div>
          </section>
        </section>
      </div>
    </main>
  </body>
</html>

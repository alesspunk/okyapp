<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDP Page 4 - OKY</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,700&family=Nunito+Sans:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/public/fontawesome-kit/css/custom-icons.min.css" />
    <link rel="stylesheet" href="./stories/mars.css" />
    <link rel="stylesheet" href="/public/pdp-pages.css" />
  </head>
  <body>
    <main class="pdp-page-shell has-plateu" aria-label="PDP Page 4">
      <section class="pdp-page-section">
        <div class="status-bar">
          <div>9:41</div>
          <div style="display:flex;gap:8px">
            <i class="fa-regular fa-signal" aria-hidden="true"></i>
            <i class="fa-regular fa-wifi" aria-hidden="true"></i>
            <i class="fa-regular fa-battery-full" aria-hidden="true"></i>
          </div>
        </div>

        <div class="page-header-screen pdp-page-header">
          <div class="header-icon header-icon-light"><i class="fa-light fa-arrow-left icon-medium" aria-hidden="true"></i></div>
          <div class="page-header-title page-header-title-empty" aria-hidden="true"></div>
          <div class="header-cart-chip header-cart-full">
            <span class="header-cart-count">2</span>
            <i class="fa-light fa-cart-shopping" aria-hidden="true"></i>
          </div>
        </div>

        <div class="pdp-page-stack">
          <div class="pdp-page-brand-slot">
            <div class="brand-item-atom is-with-label">
              <p class="brand-item-label token-product-text">Apple</p>
              <div class="brand-item-frame">
                <div class="brand-item-base" style="background:#111111">
                  <img src="./images/apple.webp" alt="Apple" />
                </div>
              </div>
            </div>
          </div>

          <div class="pdp-page-plateu-slot">
            <section class="plateu-molecule is-static is-default" style="width:340px;height:125px" aria-label="Plateu Ofertas" data-pen-id="6944:57307">
              <div class="plateu-track is-static">
                <div class="plateu-item">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu5.png" alt="PRODUCTOS" /></div>
                  <span class="plateu-label">PRODUCTOS</span>
                </div>
                <div class="plateu-item">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu6.png" alt="VALES" /></div>
                  <span class="plateu-label">VALES</span>
                </div>
                <div class="plateu-item">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu7.png" alt="OFERTAS" /></div>
                  <span class="plateu-chip">OFERTAS</span>
                </div>
              </div>
            </section>
          </div>

          <div class="pdp-page-card-slot">
            <div class="middle-card-shell is-checkout has-discount-ribbon" data-pen-id="6991:146335">
              <div class="middle-card-ribbon-slot">
                <div class="discount-ribbon discount-ribbon-wrap discount-ribbon-wrap-small discount-ribbon-type-por-tiempo">
                  <span class="discount-ribbon-text token-price-percent">18% OFF</span>
                </div>
              </div>
              <article class="middle-card-molecule is-egift">
                <div class="middle-card-content">
                  <div class="middle-card-main">
                    <p class="middle-card-title">Apple eGift Card</p>
                    <div class="middle-card-center">
                      <div class="middle-card-value">
                        <span class="middle-card-currency">$</span>
                        <p class="middle-card-amount">25</p>
                      </div>
                    </div>
                  </div>
                  <div class="middle-card-footer">
                    <span class="middle-card-footer-start">In Store, Online</span>
                    <span class="middle-card-footer-end">Redemption Instructions</span>
                    <span class="fa-icon fa-icon-card-use middle-card-link-icon" aria-hidden="true"><i class="fa-thin fa-arrow-up-right-from-square"></i></span>
                  </div>
                </div>
              </article>
            </div>
          </div>

          <div class="pdp-page-input-slot">
            <div class="input-wrapper">
              <label id="pdp4-label" class="input-label input-label-dinamic" for="pdp4-amount">Desde 10 hasta 100</label>
              <span class="input-dinamic-prefix" aria-hidden="true">$</span>
              <input
                id="pdp4-amount"
                class="input-field input-dinamic input-dinamic-hasvalue"
                type="text"
                inputmode="decimal"
                name="pdp4-amount"
                value="25"
                aria-labelledby="pdp4-label"
              />
            </div>
          </div>

          <div class="pdp-page-slider-slot">
            <div class="slider-atom" style="--slider-progress:16.6667%;">
              <div class="slider-track-shell" aria-hidden="true">
                <div class="slider-track"></div>
                <div class="slider-ticks">
                  <span class="slider-tick" style="left:0%"></span>
                  <span class="slider-tick" style="left:10%"></span>
                  <span class="slider-tick" style="left:20%"></span>
                  <span class="slider-tick" style="left:30%"></span>
                  <span class="slider-tick" style="left:40%"></span>
                  <span class="slider-tick" style="left:50%"></span>
                  <span class="slider-tick" style="left:60%"></span>
                  <span class="slider-tick" style="left:70%"></span>
                  <span class="slider-tick" style="left:80%"></span>
                  <span class="slider-tick" style="left:90%"></span>
                  <span class="slider-tick" style="left:100%"></span>
                </div>
              </div>
              <input
                class="slider-range"
                type="range"
                min="10"
                max="100"
                step="5"
                value="25"
                oninput="this.parentElement.style.setProperty('--slider-progress', (((this.value - this.min) / (this.max - this.min)) * 100) + '%')"
                aria-label="Slider en dólares"
              />
              <div class="slider-values token-body1">
                <span>$ 10</span>
                <span>$ 100</span>
              </div>
              <div class="slider-labels token-caption">
                <span>Minimum</span>
                <span>Maximum</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="pdp-page-summary-wrap">
        <div class="summary-box with-overlap summary-box-compact summary-box-saving" data-flow="giftCards" data-step="pdp">
          <div class="summary-type-overlay">
            <span class="token-exchange">TIPO DE CAMBIO: Q 7.55</span>
          </div>
          <div class="summary-card">
            <div class="summary-card-body">
              <div class="summary-row">
                <span class="summary-label-strong">Gift Card</span>
                <span><span class="summary-value-old">$57.31</span> <span class="summary-value-new">$32.69</span></span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Costo por servicio</span>
                <span><span class="summary-value-old">$15.00</span> <span class="summary-label">$7.50</span></span>
              </div>
              <div class="summary-row summary-row-total" style="padding-bottom:8px">
                <span class="summary-label-strong">PAGAS</span>
                <span class="summary-label-strong">$40.19</span>
              </div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-cta-row">
              <button class="btn btn-primary summary-btn"><i class="fa-regular fa-plus"></i>Agregar</button>
            </div>
          </div>
        </div>
      </div>
      <div class="pdp-page-footer-spacer"></div>
    </main>

    <div class="pdp-page-nav" aria-hidden="false">
      <div class="bottom-nav is-no-label">
        <div class="nav-item"><i class="fa-light fa-home icon-medium" aria-hidden="true"></i></div>
        <div class="nav-item"><i class="fa-light fa-map icon-medium" aria-hidden="true"></i></div>
        <div class="nav-item active"><i class="fa-solid fa-fire icon-medium" aria-hidden="true"></i></div>
        <div class="nav-item"><i class="fa-light fa-messages icon-medium" aria-hidden="true"></i></div>
        <div class="nav-item"><i class="fa-light fa-bars icon-medium" aria-hidden="true"></i></div>
      </div>
    </div>
  </body>
</html>

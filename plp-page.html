<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLP Page - OKY</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,700&family=Inter:wght@100..900&family=Nunito+Sans:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/public/fontawesome-kit/css/custom-icons.min.css" />
    <link rel="stylesheet" href="./stories/mars.css" />
    <link rel="stylesheet" href="/public/catalog-pages.css" />
  </head>
  <body>
    <main class="catalog-page-shell" aria-labelledby="plp-page-title">
      <h1 id="plp-page-title" class="sr-only">McDonald’s productos</h1>
      <div class="catalog-page-scroll">
        <header class="plp-page-top" aria-label="Encabezado del listado de productos">
          <div class="status-bar">
            <div>9:41</div>
            <div class="catalog-page-status-icons">
              <i class="fa-regular fa-signal" aria-hidden="true"></i>
              <i class="fa-regular fa-wifi" aria-hidden="true"></i>
              <i class="fa-regular fa-battery-full" aria-hidden="true"></i>
            </div>
          </div>

          <div class="page-header-screen plp-page-header">
            <div class="header-icon header-icon-light"><i class="fa-light fa-arrow-left icon-medium" aria-hidden="true"></i></div>
            <div class="page-header-title page-header-title-empty" aria-hidden="true"></div>
            <div class="header-cart-chip header-cart-full">
              <span class="header-cart-count">1</span>
              <i class="fa-light fa-cart-shopping" aria-hidden="true"></i>
            </div>
          </div>

          <div class="plp-page-brand-slot">
            <section class="brand-item-atom is-with-label" aria-label="Marca seleccionada">
              <p class="brand-item-label token-product-text">McDonald’s</p>
              <div class="brand-item-frame">
                <div class="brand-item-base">
                  <img src="./images/mcdonalds.webp" alt="McDonald's" />
                </div>
              </div>
            </section>
          </div>

          <div class="plp-page-plateu-wrap">
            <section
              class="plateu-molecule is-static is-default plp-page-plateu"
              aria-label="Categorías del catálogo"
              data-pen-id="6944:57168"
            >
              <div class="plateu-track is-static">
                <div class="plateu-item">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu5.png" alt="Productos" /></div>
                  <span class="plateu-chip">PRODUCTOS</span>
                </div>
                <div class="plateu-item">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu6.png" alt="Vales" /></div>
                  <span class="plateu-label">VALES</span>
                </div>
                <div class="plateu-item">
                  <div class="plateu-icon-wrap"><img class="plateu-icon" src="./images/plateu7.png" alt="Ofertas" /></div>
                  <span class="plateu-label">OFERTAS</span>
                </div>
              </div>
            </section>
          </div>
        </header>

        <section class="plp-page-list" aria-labelledby="plp-products-title">
          <h2 id="plp-products-title" class="sr-only">Listado de productos</h2>
          <div class="list-plp-anatomy" data-pen-id="dsvtw">
            <div class="list-plp-inner">
              <article aria-label="Hamburguesa de Pollo">
                <div class="list-plp-row">
                  <div class="list-plp-image">
                    <img src="./images/plp-hamburguesa-pollo.webp" alt="Hamburguesa de Pollo" />
                  </div>
                  <div class="list-plp-copy">
                    <div class="token-product-text-plp">Hamburguesa de Pollo</div>
                    <div class="list-plp-prices">
                      <span class="token-price-tag-plp">$5.69</span>
                      <span class="token-price-plp">$8.69</span>
                    </div>
                    <div class="discount-ribbon discount-ribbon-list">
                      <span class="discount-ribbon-text token-price-percent">33% OFF</span>
                    </div>
                  </div>
                  <span class="chip-ds chip-ds-add0 chip-ds-shadow list-plp-action list-plp-chip-add0">
                    <i class="fa-regular fa-plus" aria-hidden="true"></i>
                  </span>
                </div>
                <div class="list-plp-divider"></div>
              </article>

              <article aria-label="Cajita Feliz de Nuggets de Pollo">
                <div class="list-plp-row">
                  <div class="list-plp-image">
                    <img src="./images/plp-cajita-feliz.webp" alt="Cajita Feliz de Nuggets de Pollo" />
                  </div>
                  <div class="list-plp-copy">
                    <div class="token-product-text-plp">Cajita Feliz de Nuggets de Pollo</div>
                    <div class="list-plp-prices">
                      <span class="token-price-tag-plp">$32.69</span>
                      <span class="token-price-plp">$44.69</span>
                    </div>
                    <div class="discount-ribbon discount-ribbon-list">
                      <span class="discount-ribbon-text token-price-percent">25% OFF</span>
                    </div>
                  </div>
                  <span class="chip-ds chip-ds-add0 chip-ds-shadow list-plp-action list-plp-chip-add0">
                    <i class="fa-regular fa-plus" aria-hidden="true"></i>
                  </span>
                </div>
                <div class="list-plp-divider"></div>
              </article>

              <article aria-label="4 Hamburguesas de Pollo y 4 Sodas">
                <div class="list-plp-row">
                  <div class="list-plp-image">
                    <img src="./images/plp-combo-pollo.webp" alt="4 Hamburguesas de Pollo y 4 Sodas" />
                  </div>
                  <div class="list-plp-copy">
                    <div class="token-product-text-plp">4 Hamburguesas de Pollo y 4 Sodas</div>
                    <div class="list-plp-prices">
                      <span class="token-price-tag-plp plp-page-price-primary">$12.69</span>
                    </div>
                  </div>
                  <span class="chip-ds chip-ds-add0 chip-ds-shadow list-plp-action list-plp-chip-add0">
                    <i class="fa-regular fa-plus" aria-hidden="true"></i>
                  </span>
                </div>
                <div class="list-plp-divider"></div>
              </article>

              <article aria-label="Hamburguesa Cuarto de Libra">
                <div class="list-plp-row">
                  <div class="list-plp-image">
                    <img src="./images/plp-cuarto-libra.webp" alt="Hamburguesa Cuarto de Libra" />
                  </div>
                  <div class="list-plp-copy">
                    <div class="token-product-text-plp">Hamburguesa Cuarto de Libra</div>
                    <div class="list-plp-prices">
                      <span class="token-price-tag-plp plp-page-price-primary">$6.69</span>
                    </div>
                  </div>
                  <span class="chip-ds chip-ds-add0 chip-ds-shadow list-plp-action list-plp-chip-add0">
                    <i class="fa-regular fa-plus" aria-hidden="true"></i>
                  </span>
                </div>
                <div class="list-plp-divider"></div>
              </article>

              <article aria-label="Hamburguesa Big MacLibra">
                <div class="list-plp-row">
                  <div class="list-plp-image">
                    <img src="./images/plp-big-maclibra.webp" alt="Hamburguesa Big MacLibra" />
                  </div>
                  <div class="list-plp-copy">
                    <div class="token-product-text-plp">Hamburguesa Big MacLibra</div>
                    <div class="list-plp-prices">
                      <span class="token-price-tag-plp plp-page-price-primary">$12.69</span>
                    </div>
                  </div>
                  <span class="chip-ds chip-ds-add0 chip-ds-shadow list-plp-action list-plp-chip-add0">
                    <i class="fa-regular fa-plus" aria-hidden="true"></i>
                  </span>
                </div>
              </article>
            </div>
          </div>
        </section>
      </div>

      <nav class="catalog-page-nav" aria-label="Navegación principal">
        <div class="bottom-nav is-no-label">
          <div class="nav-item"><i class="fa-light fa-home icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item"><i class="fa-light fa-map icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item active"><i class="fa-solid fa-fire icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item"><i class="fa-light fa-messages icon-medium" aria-hidden="true"></i></div>
          <div class="nav-item"><i class="fa-light fa-bars icon-medium" aria-hidden="true"></i></div>
        </div>
      </nav>
    </main>
  </body>
</html>

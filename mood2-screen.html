<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKY - Mood 2</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://kit.fontawesome.com/b5a8f622db.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-frame {
            width: 360px;
            height: 800px;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            background: #ffffff;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-bar .time {
            letter-spacing: -0.28px;
        }

        .status-bar .indicators {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .battery {
            width: 24px;
            height: 12px;
            border: 1px solid rgba(0, 0, 0, 0.35);
            border-radius: 3px;
            position: relative;
            padding: 2px;
        }

        .battery::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 4px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 0 1px 1px 0;
        }

        .battery-fill {
            width: 100%;
            height: 100%;
            background: #000000;
            border-radius: 1px;
        }

        /* Header */
        .header {
            background: #ffffff;
            padding: 21px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            height: 56px;
            gap: 10px;
            overflow: hidden;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #410088;
            font-size: 24px;
        }

        .logo {
            flex: 1;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            height: 31px;
            width: auto;
        }

        /* Search Section */
        .search-section {
            background: #ffffff;
            padding: 8px 16px;
        }

        .search-bar {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 12px;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
        }

        .search-bar .fa-magnifying-glass {
            color: rgba(0, 0, 0, 0.38);
            font-size: 24px;
        }

        .search-bar input {
            border: none;
            outline: none;
            flex: 1;
            height: 100%;
            font-size: 16px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.54);
            letter-spacing: 0.15px;
            line-height: 1.43;
            font-family: 'Nunito Sans', sans-serif;
        }

        .search-bar input::placeholder {
            color: rgba(0, 0, 0, 0.54);
        }

        /* Half Tile Section */
        .half-tile-section {
            background: #ffffff;
            padding: 16px;
            display: flex;
            gap: 12px;
        }

        .tile {
            flex: 1;
            background: #ffffff;
            border: 1px solid #ffb400;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-height: 85px;
            justify-content: space-between;
        }

        .tile-title {
            color: #410088;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            text-align: center;
            width: 100%;
        }

        .tile-image {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tile-image img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* Carousel Section */
        .carousel-section {
            background: #ffffff;
            padding: 16px;
        }

        .carousel {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        .carousel-item {
            min-width: 292px;
            height: 136px;
            background: linear-gradient(135deg, #410088 0%, #7b3ba8 50%, #bc9edc 100%);
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.23);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .carousel-item::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .carousel-promo-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 8px;
            z-index: 1;
        }

        .carousel-promo-subtitle {
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 12px;
            z-index: 1;
        }

        .carousel-promo-badge {
            background: #ffb400;
            color: #000000;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 700;
            z-index: 1;
        }

        .carousel-item.promo-special {
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #5c6bc0 100%);
        }

        /* Content Section */
        .content-section {
            flex: 1;
            background: #ffffff;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        /* Offers Card */
        .offers-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.23);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10.5px 10.5px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .offer-icon {
            width: 54px;
            height: 54px;
            background: #FFF3E0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .offer-icon .fa-solid {
            color: #FF5722;
            font-size: 28px;
        }

        .offer-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .offer-title {
            color: #410088;
            font-size: 16px;
            font-weight: 600;
        }

        .offer-subtitle {
            color: rgba(0, 0, 0, 0.54);
            font-size: 12px;
        }

        .offer-detail {
            color: rgba(0, 0, 0, 0.38);
            font-size: 11px;
        }

        .promo-badge {
            background: #E8F5E9;
            color: #388E3C;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Notifications Card */
        .notifications-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.23);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10.5px 10.5px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .notif-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notif-icon {
            color: #410088;
            font-size: 24px;
        }

        .notif-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .notif-title {
            color: rgba(0, 0, 0, 0.87);
            font-size: 14px;
            font-weight: 600;
        }

        .notif-subtitle {
            color: rgba(0, 0, 0, 0.54);
            font-size: 11px;
        }

        .toggle {
            width: 44px;
            height: 24px;
            background: #E0E0E0;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .toggle-knob {
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            box-shadow: 0 2px 2px rgba(0, 0, 0, 0.2);
            transition: left 0.3s;
        }

        .toggle.active {
            background: #18afa5;
        }

        .toggle.active .toggle-knob {
            left: 22px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: #ffffff;
            height: 56px;
            border-top: 1px solid rgba(0, 0, 0, 0.23);
            display: flex;
            padding: 4px 8px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12.5px 16px;
            cursor: pointer;
            position: relative;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #410088;
        }

        .nav-item .fa-solid,
        .nav-item .fa-regular {
            color: #410088;
            font-size: 20px;
        }

        .nav-logo {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo svg {
            width: 28px;
            height: 28px;
        }

        @media (max-width: 400px) {
            .phone-frame {
                width: 100%;
                max-width: 360px;
                height: 100vh;
                max-height: 800px;
                border-radius: 0;
            }
        }
    </style>
</head>
